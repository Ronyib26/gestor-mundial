name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck y build
    runs-on: ubuntu-latest
    env:
      # pnpm/action-setup aún corre sobre Node 20; esto fuerza Node 24 y silencia
      # el warning de deprecación hasta que publiquen una versión compatible.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Generar Prisma Client
        run: pnpm --filter server exec prisma generate

      - name: Typecheck server
        run: pnpm --filter server exec tsc --noEmit

      - name: Typecheck client
        run: pnpm --filter client exec tsc -b --noEmit

      - name: Build client
        run: pnpm --filter client build

      - name: Build server
        run: pnpm --filter server build
