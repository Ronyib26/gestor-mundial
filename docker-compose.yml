services:
  postgres:
    image: postgres:18.4
    container_name: gestor-mundial-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mundial
      POSTGRES_PASSWORD: mundial_dev
      POSTGRES_DB: gestor_mundial
    ports:
      - "5434:5432"
    volumes:
      - gestor-mundial-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mundial -d gestor_mundial"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gestor-mundial-pgdata:
